- name: Manual Object Store Backup
  hosts: ubuntu_arcgis_svrs
  become: yes
  become_user: arcgis
  
  vars:
    # Path to the Data Store tools on Ubuntu
    ds_tools_path: "/opt/esrigis/arcgis/datastore/tools"
    # The SMB mount point we set up earlier
    backup_dir: "/mnt/gis_backups/final/objds"
    # Dynamic filename using a timestamp
    backup_name: "manual_objds_bk_{{ ansible_date_time.iso8601_basic_short }}"

  tasks:
    - name: Ensure manual backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Execute backupdatastore utility
      ansible.builtin.shell:
        cmd: "./backupdatastore.sh {{ backup_name }} --store object --prompt no"
        chdir: "{{ ds_tools_path }}"
      register: ds_backup_result
      changed_when: true

    - name: Verify backup completion
      ansible.builtin.debug:
        msg: "Data Store backup created: {{ backup_name }} at {{ backup_dir }}"
      when: "'Operation completed successfully' in ds_backup_result.stdout"

    - name: Find manual backups older than 28 days
      ansible.builtin.find:
        paths: 
          - "{{ backup_dir }}"
        age: 28d
        recurse: no
        file_type: any
        patterns: "manual_objds_*"
      register: old_backups

    - name: Delete expired manual backup files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"
      when: old_backups.matched > 0

    - name: Summary of cleanup
      ansible.builtin.debug:
        msg: "Cleaned up {{ old_backups.matched }} old backup files."
      when: old_backups.matched > 0