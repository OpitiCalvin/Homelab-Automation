- name: Pre-Flight Reachability Check
  hosts: ubuntu_arcgis_svrs
  gather_facts: false
  any_errors_fatal: true  # Stop EVERYTHING if one host fails
  
  tasks:
    - name: Verify network reachability
      ansible.builtin.ping:
      register: ping_result

    - name: Fail if host is unreachable
      ansible.builtin.fail:
        msg: "Stopping! Host {{ inventory_hostname }} is not responding."
      when: ping_result.failed is defined and ping_result.failed

- name: Sequential Rolling Upgrade and Restart
  hosts: ubuntu_arcgis_svrs
  serial: 1               # Move one-by-one only if the play above passed
  become: true
  gather_facts: true
  
  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: safe
        autoremove: yes
        autoclean: yes
        purge: yes

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after  package upgrade"
        reboot_timeout: 600
      when: reboot_required.stat.exists

    - name: Status report
      ansible.builtin.debug:
        msg: "SKIPPING REBOOT: {{ inventory_hostname }} does not require a restart."
      when: not reboot_required.stat.exists
